<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FOSCOS Officer Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/officer_portal.css') }}?v=1" />
  {% block extra_css %}{% endblock %}
</head>
<body class="officer-body">

  <!-- ── Sidebar ── -->
  <aside class="officer-sidebar" id="officerSidebar">
    <div class="officer-sidebar__brand">
      <img src="{{ url_for('static', filename='images/fssai_logo.png') }}" alt="FSSAI" class="officer-sidebar__logo-img" />
      <span class="officer-sidebar__brand-sub">Officer Portal</span>
    </div>

    <nav class="officer-sidebar__nav">
      <a href="/officer/dashboard" class="officer-nav-link {% block nav_dashboard %}{% endblock %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/officer/applications" class="officer-nav-link {% block nav_applications %}{% endblock %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Applications
      </a>
    </nav>

    <div class="officer-sidebar__footer">
      <div class="officer-user-pill" id="officerUserPill">
        <div class="officer-user-pill__avatar" id="officerAvatar">?</div>
        <span class="officer-user-pill__name" id="officerName">Loading...</span>
      </div>
      <button class="officer-signout-btn" id="officerSignOutBtn">Sign out</button>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <main class="officer-main" id="officerMain">
    {% block content %}{% endblock %}
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="{{ url_for('static', filename='js/firebase-init.js') }}"></script>
  <script src="{{ url_for('static', filename='js/officer_auth.js') }}?v=1"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
