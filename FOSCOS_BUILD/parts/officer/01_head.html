<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FoSCoS — Officer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#243856;--navyDk:#182840;--navyLt:#EDF2F7;
  --sage:#AEB884;--sageLt:#F0F3E8;--sageDk:#6a8a4a;
  --amber:#DFA36D;--amberLt:#FDF3E7;--amberDk:#b87d3e;
  --cream:#FFFDE4;
  --red:#DC2626;--redLt:#FEE2E2;
  --green:#16A34A;--greenLt:#DCFCE7;
  --blue:#2563EB;--blueLt:#EFF6FF;
  --purple:#7C3AED;--purpleLt:#EDE9FE;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g900:#111827;
  --border:#E2E8D0;
  --sw:248px;--th:58px;--r:12px;
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 16px rgba(0,0,0,.08);
  --s3:0 10px 40px rgba(0,0,0,.14);
  --tr:.17s ease;
}
body{font-family:'DM Sans',sans-serif;background:#F4F6F0;color:var(--g900);display:flex;height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ── LOGIN PAGE ── */
#officer-login-page{position:fixed;inset:0;background:linear-gradient(135deg,var(--navyDk),var(--navy));display:flex;align-items:center;justify-content:center;z-index:500}
#officer-login-page.hidden{display:none}
.login-card{background:#fff;border-radius:20px;padding:40px;width:400px;max-width:95vw;box-shadow:var(--s3)}

/* ── SIDEBAR ── */
#sidebar{width:var(--sw);background:var(--navyDk);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;flex-shrink:0}
.sb-logo{height:var(--th);display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-mark{width:32px;height:32px;background:var(--sage);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
.sb-name{font-weight:700;font-size:13px;color:#fff;line-height:1.2}
.sb-sub{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.3px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.3);padding:14px 10px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-weight:500;font-size:12.5px;transition:var(--tr);user-select:none;position:relative}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sb-item.active{background:rgba(174,184,132,.18);color:var(--sage);border-left:2px solid var(--sage);padding-left:8px}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sb-badge.am{background:var(--amber)}
.sb-badge.gr{background:var(--sage)}
.sb-foot{padding:10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:var(--tr)}
.sb-user:hover{background:rgba(255,255,255,.06)}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.sb-un{font-weight:600;font-size:12px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ur{font-size:9px;color:rgba(255,255,255,.35)}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;z-index:90}
#pg-title{font-family:'DM Serif Display',serif;font-weight:400;font-size:18px;flex:1;color:var(--navy)}
.tb-srch{display:flex;align-items:center;gap:7px;background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:6px 12px;width:200px}
.tb-srch input{background:none;border:none;outline:none;font-size:12.5px;color:var(--g900);width:100%}
.tb-srch input::placeholder{color:var(--g400)}
.ic-btn{width:32px;height:32px;border-radius:8px;background:var(--g50);border:1px solid var(--g200);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--tr);position:relative;flex-shrink:0}
.ic-btn:hover{background:var(--g100)}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid #fff}
.tb-date{font-size:11px;color:var(--g500);font-weight:500;white-space:nowrap}

/* ── MAIN ── */
#main{margin-left:var(--sw);margin-top:var(--th);flex:1;overflow-y:auto;height:calc(100vh - var(--th));padding:22px}
#main-inner{display:none}
#main-inner.visible{display:block}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);padding:20px}
.card-flush{padding:0;overflow:hidden}
.card:hover{box-shadow:var(--s2)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.gw{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.mt{margin-top:14px}
.mb{margin-bottom:14px}

/* ── STAT CARDS ── */
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--s1);cursor:pointer;transition:var(--tr)}
.stat-card:hover{box-shadow:var(--s2);transform:translateY(-1px)}
.stat-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.s-navy{background:var(--navyLt)} .s-sage{background:var(--sageLt)} .s-red{background:var(--redLt)} .s-amber{background:var(--amberLt)} .s-green{background:var(--greenLt)}
.stat-val{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.5px;color:var(--navy)}
.stat-lbl{font-size:11px;color:var(--g500);margin-top:3px;font-weight:500}
.stat-chg{font-size:10px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:99px}
.chg-up{background:var(--greenLt);color:var(--green)} .chg-dn{background:var(--redLt);color:var(--red)} .chg-neu{background:var(--amberLt);color:var(--amberDk)}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-t{font-size:13px;font-weight:700;color:var(--navy)}
.sh-a{font-size:11px;color:var(--sage);font-weight:600;cursor:pointer}
.sh-a:hover{text-decoration:underline}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.b-navy{background:var(--navyLt);color:var(--navy)}
.b-sage{background:var(--sageLt);color:var(--sageDk)}
.b-green{background:var(--greenLt);color:var(--green)}
.b-red{background:var(--redLt);color:var(--red)}
.b-amber{background:var(--amberLt);color:var(--amberDk)}
.b-grey{background:var(--g100);color:var(--g600)}
.b-blue{background:var(--blueLt);color:var(--blue)}
.b-purple{background:var(--purpleLt);color:var(--purple)}

/* ── STATUS PILLS ── */
.spill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.spill::before{content:'';width:6px;height:6px;border-radius:50%}
.sp-reg{background:var(--greenLt);color:var(--green)}.sp-reg::before{background:var(--green)}
.sp-irr{background:var(--amberLt);color:var(--amberDk)}.sp-irr::before{background:var(--amber)}
.sp-mis{background:var(--redLt);color:var(--red)}.sp-mis::before{background:var(--red)}

/* ── PIPELINE ── */
.pipeline{display:flex;align-items:center;gap:0;margin:18px 0;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;overflow-x:auto}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;min-width:80px}
.pipe-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:var(--g200);z-index:0}
.pipe-step.done::after,.pipe-step.active::after{background:var(--sage)}
.pipe-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--g200);background:#fff;z-index:1;transition:var(--tr)}
.pipe-step.done .pipe-dot{background:var(--sage);border-color:var(--sage);color:#fff}
.pipe-step.active .pipe-dot{background:var(--amber);border-color:var(--amber);color:#fff;box-shadow:0 0 0 4px rgba(223,163,109,.2)}
.pipe-step.blocked .pipe-dot{background:var(--redLt);border-color:var(--red);color:var(--red)}
.pipe-lbl{font-size:10px;font-weight:600;color:var(--g500);text-align:center;white-space:nowrap}
.pipe-step.done .pipe-lbl{color:var(--sageDk)}
.pipe-step.active .pipe-lbl{color:var(--amberDk);font-weight:700}
.pipe-step.blocked .pipe-lbl{color:var(--red)}

/* ── AUDIT TRAIL ── */
.audit-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--g100);position:relative}
.audit-item:last-child{border-bottom:none}
.audit-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:36px;bottom:-11px;width:1px;background:var(--g200)}
.audit-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}
.audit-body{flex:1}
.audit-action{font-size:13px;font-weight:600;color:var(--navy)}
.audit-meta{font-size:11px;color:var(--g500);margin-top:2px}
.audit-note{font-size:12px;color:var(--g600);margin-top:5px;padding:8px 10px;background:var(--g50);border-radius:7px;border-left:2px solid var(--g300);line-height:1.5}

/* ── TRIAGE ── */
.triage-section{margin-bottom:18px}
.triage-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.triage-dot{width:8px;height:8px;border-radius:50%}
.triage-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.triage-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.triage-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:var(--tr);display:flex;align-items:flex-start;gap:12px}
.triage-item:hover{box-shadow:var(--s2);border-color:var(--g300)}
.triage-item.urgent{border-left:3px solid var(--red)}
.triage-item.warn{border-left:3px solid var(--amber)}
.triage-item.info{border-left:3px solid var(--sage)}
.ti-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.ti-title{font-size:13px;font-weight:700;color:var(--navy)}
.ti-sub{font-size:12px;color:var(--g500);margin-top:2px;line-height:1.5}
.ti-meta{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap;align-items:center}

/* ── SLA TIMER ── */
.sla-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700}
.sla-urgent{background:var(--redLt);color:var(--red)}
.sla-warn{background:var(--amberLt);color:var(--amberDk)}
.sla-ok{background:var(--greenLt);color:var(--green)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--g50)}
tbody tr{cursor:pointer;transition:var(--tr);border-bottom:1px solid var(--g100)}
tbody tr:hover{background:#F0F7EE}
tbody td{padding:11px 14px;font-size:12.5px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}
.row-flag{background:var(--redLt)!important}
.row-flag:hover{background:#FEE2E2!important}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tb-inp{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;min-width:160px;max-width:220px}
.tb-inp input{background:none;border:none;outline:none;font-size:12.5px;width:100%}
.tb-sel{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--g700);cursor:pointer;outline:none;font-weight:500}
.ftabs{display:flex;gap:3px;flex-wrap:wrap}
.ft{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--g600);transition:var(--tr)}
.ft.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.ft:hover:not(.active){background:var(--g100)}

/* ── INNER TABS ── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab-btn{padding:8px 15px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--g500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--tr);white-space:nowrap}
.tab-btn:hover:not(.active){color:var(--navy)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--sage)}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:fadeUp .18s ease}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);white-space:nowrap;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navyDk)}
.btn-sage{background:var(--sage);color:#fff}.btn-sage:hover{background:var(--sageDk)}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:var(--amberDk)}
.btn-ghost{background:transparent;color:var(--g600);border:1px solid var(--border)}.btn-ghost:hover{background:var(--g100)}
.btn-red{background:var(--redLt);color:var(--red)}.btn-red:hover{background:#FCA5A5}
.btn-green{background:var(--greenLt);color:var(--green)}.btn-green:hover{background:#86EFAC}
.btn-sm{padding:5px 11px;font-size:11.5px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;padding:26px;width:420px;max-width:95vw;box-shadow:var(--s3);transform:scale(.96);transition:transform .18s ease}
.modal-ov.open .modal{transform:scale(1)}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:3px;color:var(--navy)}
.modal-sub{font-size:12px;color:var(--g500);margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--g700);margin-bottom:4px;display:block}
.fc{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;outline:none;transition:var(--tr);background:#fff;font-family:'DM Sans',sans-serif;color:var(--g900)}
.fc:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(174,184,132,.18)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── ACTIVITY LIST ── */
.act-list{display:flex;flex-direction:column}
.act-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--g100)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0}
.ad-sage{background:var(--sage)} .ad-red{background:var(--red)} .ad-amber{background:var(--amber)} .ad-navy{background:var(--navy)} .ad-green{background:var(--green)}
.act-txt{font-size:12.5px;flex:1;line-height:1.5;color:var(--g700)}
.act-txt strong{color:var(--g900);font-weight:600}
.act-time{font-size:10px;color:var(--g400);white-space:nowrap;margin-top:3px}

/* ── INSPECTIONS ── */
.insp-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 15px;display:flex;align-items:flex-start;gap:12px;margin-bottom:9px;cursor:pointer;transition:var(--tr)}
.insp-card:hover{box-shadow:var(--s2)}
.insp-date{text-align:center;min-width:40px;background:var(--navyLt);border-radius:8px;padding:6px 5px;flex-shrink:0}
.insp-day{font-size:18px;font-weight:700;color:var(--navy);line-height:1}
.insp-mon{font-size:9px;font-weight:700;color:var(--navy);text-transform:uppercase}

/* ── GRIEVANCE CARDS ── */
.griev-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 15px;margin-bottom:9px;cursor:pointer;transition:var(--tr)}
.griev-card:hover{box-shadow:var(--s2)}
.gc-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--g400);margin-top:2px}
.gc-body{font-size:12px;color:var(--g600);margin-top:6px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2}

/* ── BAR CHART ── */
.bar-chart{height:150px;display:flex;align-items:flex-end;gap:5px;padding-top:12px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bc-bar{width:100%;border-radius:4px 4px 0 0;transition:height .9s cubic-bezier(.4,0,.2,1);min-height:3px}
.bc-lbl{font-size:10px;color:var(--g400);white-space:nowrap}

/* ── RISK BARS ── */
.risk-item{margin-bottom:11px}
.risk-hd{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.risk-track{height:6px;background:var(--g100);border-radius:99px;overflow:hidden}
.risk-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* ── INFO FIELDS ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.if-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:3px}
.if-val{font-size:13px;font-weight:500;color:var(--g900)}

/* ── DOC ITEMS ── */
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100)}
.doc-item:last-child{border-bottom:none}
.doc-ico{font-size:17px}
.doc-name{font-size:13px;font-weight:500;flex:1}
.doc-actions{display:flex;gap:5px}

/* ── LEAGUE CARDS ── */
.league-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.lcard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:var(--tr);cursor:pointer;position:relative;overflow:hidden}
.lcard:hover{box-shadow:var(--s2);transform:translateY(-2px)}
.lcard.gold{border-color:#FCD34D;border-width:2px}

.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--g100);border-radius:5px;font-size:11px;color:var(--g600);font-weight:500}
