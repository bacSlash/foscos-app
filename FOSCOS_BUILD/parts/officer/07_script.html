// ── State ──────────────────────────────────────────────────────
let auth, supabaseClient;

// ── Bootstrap ──────────────────────────────────────────────────
async function initServices() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error('Config unavailable');
    const cfg = await res.json();
    const fbApp = initializeApp(cfg.firebase);
    auth = getAuth(fbApp);
    supabaseClient = window.supabase.createClient(cfg.supabase.url, cfg.supabase.anon_key);
  } catch(e) { auth = null; supabaseClient = null; }
}

function authFetch(url, opts = {}) {
  if (!opts.headers) opts.headers = {};
  if (officerToken) opts.headers['Authorization'] = 'Bearer ' + officerToken;
  return fetch(url, opts);
}

// ── Officer Auth ───────────────────────────────────────────────
async function officerSendOTP() {
  const mobile = document.getElementById('officer-mobile')?.value.trim();
  if (!mobile || mobile.length !== 10) { alert('Enter a valid 10-digit mobile number.'); return; }
  const dispEl = document.getElementById('officer-mobile-disp');
  if (dispEl) dispEl.textContent = mobile;

  if (!auth) { showLoginStep2(); return; }
  try {
    const verifier = new RecaptchaVerifier(auth, 'officer-recaptcha', { size:'invisible' });
    _officerConfirmResult = await signInWithPhoneNumber(auth, '+91' + mobile, verifier);
  } catch(e) {}
  showLoginStep2();
}

function showLoginStep2() {
  document.getElementById('officer-login-p1').style.display = 'none';
  document.getElementById('officer-login-p2').style.display = 'block';
}

async function officerVerifyOTP() {
  const otp = [1,2,3,4,5,6].map(i => document.getElementById('oo' + i)?.value || '').join('');
  const errEl = document.getElementById('officer-otp-err');

  const proceed = async (idToken) => {
    try {
      const res = await fetch('/api/auth/verify', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id_token: idToken || 'mock_officer_token', role:'officer' }),
      });
      if (res.ok) {
        const d = await res.json();
        officerToken = d.token || 'mock_officer_token';
        const user = d.user || {};
        localStorage.setItem('officer_token', officerToken);
        localStorage.setItem('officer_user', JSON.stringify(user));
        updateOfficerProfile(user);
      }
    } catch(_) {
      officerToken = 'mock_officer_token';
    }
    enterPortal();
  };

  if (!_officerConfirmResult || !auth) { await proceed(null); return; }
  if (otp.length < 6) { if (errEl) errEl.style.display = 'block'; return; }

  try {
    const cred = await _officerConfirmResult.confirm(otp);
    if (errEl) errEl.style.display = 'none';
    await proceed(await cred.user.getIdToken());
  } catch(e) {
    if (errEl) errEl.style.display = 'block';
  }
}

function officerOtpAdv(n) {
  if (n < 6) {
    const curr = document.getElementById('oo' + n);
    const next = document.getElementById('oo' + (n + 1));
    if (curr?.value && next) next.focus();
  }
}

function updateOfficerProfile(user) {
  const name  = user.name  || 'Officer';
  const role  = user.role  || 'FSSAI Officer';
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || 'OF';

  ['officer-avatar', 'profile-avatar-lg'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = initials;
  });
  const nameEls = ['officer-name-sb', 'profile-name'];
  nameEls.forEach(id => { const el = document.getElementById(id); if (el) el.textContent = name; });
  const roleEl = document.getElementById('officer-role-sb');
  if (roleEl) roleEl.textContent = role;
}

// URL slug ↔ internal page-id mapping
const URL_TO_PAGE = { queue:'myqueue' };
const PAGE_TO_URL = { myqueue:'queue' };

function enterPortal() {
  const login = document.getElementById('officer-login-page');
  if (login) login.classList.add('hidden');
  startClock();
  renderApps();
  renderFBO();
  renderGrievances();
  initCharts();

  // Navigate to the page matching the current URL (or default to dashboard)
  const slug = window.location.pathname.replace(/^\/officer\/?/, '') || 'dashboard';
  const page = URL_TO_PAGE[slug] || slug;
  navigate(page, true);
}

function officerLogout() {
  localStorage.removeItem('officer_token');
  localStorage.removeItem('officer_user');
  window.location.href = '/officer';
}

// ── Navigation ─────────────────────────────────────────────────
// fromPopstate=true skips pushState (browser already handled it)
function navigate(page, fromPopstate) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.add('active');

  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  const sbItem = document.querySelector(`.sb-item[data-page="${page}"]`);
  if (sbItem) sbItem.classList.add('active');

  const titles = {
    dashboard:'Dashboard', myqueue:'My Queue', applications:'Applications',
    fbo:'FBO Directory', monitoring:'Routine Monitoring', inspections:'Inspections',
    grievances:'Grievances', league:'Clean Kitchen League', reports:'Reports',
    settings:'Settings & Profile',
  };
  const titleEl = document.getElementById('pg-title');
  if (titleEl) titleEl.textContent = titles[page] || page;

  closeAppDetail();
  closeFBOProfile();

  if (page === 'dashboard') loadOfficerDashboard();

  // Update browser URL
  if (!fromPopstate) {
    const slug = PAGE_TO_URL[page] || page;
    const newPath = '/officer/' + slug;
    if (window.location.pathname !== newPath) {
      history.pushState({ page }, '', newPath);
    }
  }
}

// Back/forward button support
window.addEventListener('popstate', e => {
  const page = e.state?.page;
  if (page) navigate(page, true);
});

// ── Dashboard ──────────────────────────────────────────────────
async function loadOfficerDashboard() {
  const dateEl = document.getElementById('dash-date-label');
  if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

  try {
    const res = await authFetch('/api/officer/stats');
    if (res.ok) {
      const d = await res.json();
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('dash-stat-pending',   d.pending_applications || 127);
      set('dash-stat-delayed',   d.delayed_cases        || 34);
      set('dash-stat-approved',  d.approved_licenses    || 892);
      set('dash-stat-grievances',d.open_grievances      || 5);
    }
  } catch(_) {}
}

// ── Applications ───────────────────────────────────────────────
function renderApps() {
  const tbody = document.getElementById('app-tbody');
  if (!tbody) return;
  const search = (document.getElementById('app-search')?.value || '').toLowerCase();
  const filt   = _appFilt;

  const filtered = SAMPLE_APPS.filter(a => {
    const matchSearch = !search || a.name.toLowerCase().includes(search) || a.app_number.includes(search);
    const statusMap = { 'New':'submitted', 'Pending':'docs_review', 'Approved':'approved', 'Delayed':'under_review' };
    const matchFilt = filt === 'All' || a.status === statusMap[filt] || (filt === 'Delayed' && a.flagged);
    return matchSearch && matchFilt;
  });

  tbody.innerHTML = filtered.map(a => `
    <tr onclick="openAppDetail('${a.id}')" class="${a.flagged ? 'row-flag' : ''}">
      <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--g400)">${a.app_number}</span></td>
      <td><strong>${a.name}</strong>${a.flagged ? ' <span class="badge b-red">Flagged</span>' : ''}</td>
      <td>${a.cat}</td>
      <td style="color:var(--g500);font-size:12px;">${a.date}</td>
      <td><span class="badge ${a.step >= 5 ? 'b-green' : a.step >= 3 ? 'b-amber' : 'b-navy'}">Step ${a.step} — ${STEP_LABELS[a.step]}</span></td>
      <td>${STATUS_BADGE[a.status] || a.status}</td>
      <td style="color:var(--g500);font-size:12px;">Rajesh K.</td>
      <td><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openAppDetail('${a.id}')">Review →</button></td>
    </tr>`).join('');
}

function openAppDetail(appId) {
  const app = SAMPLE_APPS.find(a => a.id === appId);
  if (!app) return;
  _currentAppId = appId;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const detPage = document.getElementById('app-detail-page');
  if (detPage) detPage.classList.add('active');

  // Header
  const hd = document.getElementById('app-det-hd');
  if (hd) hd.innerHTML = `
    <div style="width:48px;height:48px;border-radius:12px;background:var(--navyLt);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🏪</div>
    <div style="flex:1;">
      <div style="font-size:16px;font-weight:700;color:var(--navy);">${app.name}</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px;">${app.cat} · ${app.app_number}</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
        ${STATUS_BADGE[app.status] || ''}
        ${app.flagged ? '<span class="badge b-red">🚩 Flagged</span>' : ''}
        <span class="badge b-grey">Filed ${app.date}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;">
      <button class="btn btn-sage btn-sm" onclick="updateAppStatus('${app.id}','approved')">✅ Approve</button>
      <button class="btn btn-red btn-sm" onclick="updateAppStatus('${app.id}','rejected')">❌ Reject</button>
      <button class="btn btn-ghost btn-sm" onclick="openFlagModal('${app.id}')">🚩 Flag</button>
      <button class="btn btn-ghost btn-sm" onclick="openAssignModal()">🔍 Assign Inspection</button>
    </div>`;

  // Pipeline
  const pipeline = document.getElementById('app-pipeline');
  if (pipeline) {
    const steps = ['Submitted','Docs Review','Under Review','Inspection','Approved'];
    pipeline.innerHTML = steps.map((lbl, i) => {
      const cls = i + 1 < app.step ? 'done' : i + 1 === app.step ? 'active' : '';
      return `<div class="pipe-step ${cls}"><div class="pipe-dot">${i + 1 < app.step ? '✓' : i + 1}</div><div class="pipe-lbl">${lbl}</div></div>${i < 4 ? '' : ''}`;
    }).join('');
  }

  // Info tab
  const info = document.getElementById('appdet-info-content');
  if (info) info.innerHTML = `
    <div class="info-grid" style="margin-bottom:16px;">
      <div><div class="if-lbl">Business Name</div><div class="if-val">${app.name}</div></div>
      <div><div class="if-lbl">Category</div><div class="if-val">${app.cat}</div></div>
      <div><div class="if-lbl">Application No.</div><div class="if-val" style="font-family:'DM Mono',monospace;font-size:12px;">${app.app_number}</div></div>
      <div><div class="if-lbl">Date Filed</div><div class="if-val">${app.date}</div></div>
      <div><div class="if-lbl">Current Step</div><div class="if-val">Step ${app.step} — ${STEP_LABELS[app.step]}</div></div>
      <div><div class="if-lbl">Assigned Officer</div><div class="if-val">Rajesh Kumar</div></div>
    </div>`;

  // Docs tab
  const docs = document.getElementById('appdet-docs-content');
  if (docs) {
    const sampleDocs = [
      { id:'doc-1', label:'Photo Identity Proof', status:'approved', note:'' },
      { id:'doc-2', label:'Address / Premises Proof', status:'approved', note:'' },
      { id:'doc-3', label:'List of Food Items', status:'pending', note:'' },
      { id:'doc-4', label:'Geotagged Premises Photo', status: app.flagged ? 'rejected' : 'pending', note: app.flagged ? 'Image quality insufficient — please re-upload a clearer photo' : '' },
    ];
    docs.innerHTML = sampleDocs.map(d => `
      <div class="doc-item" data-doc-id="${d.id}">
        <div class="doc-ico">📄</div>
        <div class="doc-name">${d.label}</div>
        <div class="doc-actions">
          <button class="btn btn-ghost btn-xs" onclick="getSignedURL('${d.id}')">👁 View</button>
          <button class="btn btn-green btn-xs" onclick="reviewDocument('${d.id}','approved','')">✓ Approve</button>
          <button class="btn btn-red btn-xs" onclick="openDocRejectDialog('${d.id}')">✗ Flag</button>
        </div>
        ${d.status === 'rejected' && d.note ? `<div class="note-box" style="margin-top:6px;width:100%;">⚠️ ${d.note}</div>` : ''}
      </div>`).join('');
  }

  // Audit trail
  const trail = document.getElementById('appdet-trail-content');
  if (trail) trail.innerHTML = `
    <div class="audit-item"><div class="audit-dot" style="background:var(--navy)">📋</div><div class="audit-body"><div class="audit-action">Application Submitted</div><div class="audit-meta">${app.date} · Applicant</div></div></div>
    <div class="audit-item"><div class="audit-dot" style="background:var(--amber)">🔍</div><div class="audit-body"><div class="audit-action">Document Review Started</div><div class="audit-meta">${app.date} · Rajesh Kumar (Officer)</div></div></div>
    ${app.flagged ? `<div class="audit-item"><div class="audit-dot" style="background:var(--red)">🚩</div><div class="audit-body"><div class="audit-action">Application Flagged</div><div class="audit-meta">Today · Rajesh Kumar<div class="audit-note">${app.flagReason || 'Requires clarification'}</div></div></div></div>` : ''}`;

  // Flag history
  const flags = document.getElementById('appdet-flags-content');
  if (flags) flags.innerHTML = app.flagged
    ? `<div class="flag-history-item"><strong>🚩 Flagged</strong> — ${app.flagReason || 'See notes'}<br/><span style="font-size:10px;color:var(--g400)">Today · Rajesh Kumar</span></div>`
    : '<div class="empty"><div class="empty-ico">🏳️</div>No flags on this application</div>';

  // Subscribe realtime if available
  if (supabaseClient && appId !== 'mock') {
    if (_appRealtimeChannel) supabaseClient.removeChannel(_appRealtimeChannel);
    _appRealtimeChannel = supabaseClient.channel('officer-docs-' + appId)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'documents', filter:`application_id=eq.${appId}` },
        payload => showToast('Document updated: ' + payload.new.doc_key))
      .subscribe();
  }
}

function closeAppDetail() {
  const det = document.getElementById('app-detail-page');
  if (det) det.classList.remove('active');
}

async function reviewDocument(docId, status, note) {
  const btn = event?.target;
  if (btn) btn.disabled = true;
  try {
    await authFetch(`/api/officer/documents/${docId}/review`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status, officer_note: note }),
    });
  } catch(_) {}
  showToast(status === 'approved' ? '✅ Document approved' : '❌ Document flagged — applicant notified');
  if (btn) btn.disabled = false;
}

function openDocRejectDialog(docId) {
  const note = prompt('Enter rejection note for the applicant:');
  if (note !== null) reviewDocument(docId, 'rejected', note);
}

async function getSignedURL(docId) {
  showToast('Fetching document…');
  try {
    const res = await authFetch(`/api/officer/documents/${docId}/signed-url`);
    if (res.ok) {
      const d = await res.json();
      if (d.url) window.open(d.url, '_blank');
    }
  } catch(_) {}
  showToast('Opening document viewer…');
}

async function updateAppStatus(appId, status) {
  try {
    await authFetch(`/api/officer/applications/${appId}/status`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status }),
    });
  } catch(_) {}
  showToast(status === 'approved' ? '✅ Application approved! Applicant notified.' : '❌ Application rejected. Reason sent to applicant.');
  const app = SAMPLE_APPS.find(a => a.id === appId);
  if (app) { app.status = status; app.step = status === 'approved' ? 5 : app.step; }
  closeAppDetail();
  renderApps();
}

function setFilt(type, filt, btn) {
  if (type === 'app')   { _appFilt   = filt; document.querySelectorAll('#app-ftabs .ft').forEach(b => b.classList.remove('active')); }
  if (type === 'griev') { _grievFilt = filt; document.querySelectorAll('#griev-ftabs .ft').forEach(b => b.classList.remove('active')); }
  if (type === 'fbo')   { _fboFilt   = filt; }
  if (btn) btn.classList.add('active');
  if (type === 'app')   renderApps();
  if (type === 'griev') renderGrievances();
  if (type === 'fbo')   renderFBO();
}

// ── FBO Directory ──────────────────────────────────────────────
function renderFBO() {
  const tbody = document.getElementById('fbo-tbody');
  if (!tbody) return;
  const search = (document.getElementById('fbo-search')?.value || '').toLowerCase();

  const filtered = SAMPLE_FBOS.filter(f => !search || f.name.toLowerCase().includes(search) || f.fssai.includes(search) || f.loc.toLowerCase().includes(search));

  const complianceColor = { High:'b-green', Medium:'b-amber', Low:'b-red' };
  const riskColor       = { Low:'b-green',  Medium:'b-amber', High:'b-red' };

  tbody.innerHTML = filtered.map(f => `
    <tr onclick="openFBOProfile('${f.fssai}')">
      <td><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--g400)">${f.fssai}</span></td>
      <td><strong>${f.emoji} ${f.name}</strong></td>
      <td style="font-size:12px;color:var(--g600);">${f.type}</td>
      <td style="font-size:12px;color:var(--g500);">${f.loc}</td>
      <td><span class="badge ${complianceColor[f.compliance] || 'b-grey'}">${f.compliance}</span></td>
      <td><span class="badge ${riskColor[f.risk] || 'b-grey'}">${f.risk}</span></td>
      <td style="font-size:12px;color:var(--g500);">${f.expiry}</td>
      <td><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openFBOProfile('${f.fssai}')">View →</button></td>
    </tr>`).join('');
}

function openFBOProfile(fssai) {
  const fbo = SAMPLE_FBOS.find(f => f.fssai === fssai);
  if (!fbo) return;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('fbo-profile-page');
  if (page) page.classList.add('active');

  const content = document.getElementById('fbo-profile-content');
  if (content) content.innerHTML = `
    <div class="fbo-prof-hd">
      <div class="fbo-logo-lg">${fbo.emoji}</div>
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:700;color:var(--navy);">${fbo.name}</div>
        <div style="font-size:12px;color:var(--g500);margin-top:3px;font-family:'DM Mono',monospace;">FSSAI: ${fbo.fssai}</div>
        <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
          <span class="badge b-green">● Active</span>
          <span class="badge b-navy">${fbo.type}</span>
          <span class="badge b-grey">${fbo.loc}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;">
        <button class="btn btn-primary btn-sm" onclick="openAssignModal()">🔍 Schedule Inspection</button>
        <button class="btn btn-ghost btn-sm" onclick="showToast('Viewing license history…')">📋 History</button>
      </div>
    </div>
    <div class="g3">
      <div class="card"><div style="font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Compliance Score</div><div style="font-size:24px;font-weight:700;color:var(--navy);">${fbo.compliance === 'High' ? '92' : fbo.compliance === 'Medium' ? '74' : '48'}</div><div class="risk-track" style="margin-top:6px;"><div class="risk-fill" style="width:${fbo.compliance === 'High' ? 92 : fbo.compliance === 'Medium' ? 74 : 48}%;background:${fbo.compliance === 'High' ? 'var(--green)' : fbo.compliance === 'Medium' ? 'var(--amber)' : 'var(--red)'}"></div></div></div>
      <div class="card"><div style="font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">License Expiry</div><div style="font-size:16px;font-weight:700;color:var(--navy);">${fbo.expiry}</div><div style="font-size:12px;color:var(--g500);margin-top:4px;">${Math.ceil((new Date(fbo.expiry) - Date.now()) / 86400000)} days left</div></div>
      <div class="card"><div style="font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Risk Level</div><div style="font-size:16px;font-weight:700;color:var(--navy);">${fbo.risk}</div><span class="badge ${fbo.risk === 'Low' ? 'b-green' : fbo.risk === 'Medium' ? 'b-amber' : 'b-red'}" style="margin-top:6px;display:inline-flex;">${fbo.risk} Risk</span></div>
    </div>`;
}

function closeFBOProfile() {
  const p = document.getElementById('fbo-profile-page');
  if (p) p.classList.remove('active');
}

// ── Grievances ─────────────────────────────────────────────────
function renderGrievances() {
  const list = document.getElementById('grievance-list');
  if (!list) return;
  const search = (document.getElementById('griev-search')?.value || '').toLowerCase();
  const filt   = _grievFilt;

  const filtered = SAMPLE_GRIEVANCES.filter(g => {
    const matchSearch = !search || g.fbo_name.toLowerCase().includes(search) || g.complaint_id.includes(search) || g.issue.toLowerCase().includes(search);
    const matchFilt   = filt === 'All' || g.priority === filt.toLowerCase() || g.status === filt.toLowerCase().replace(' ', '_');
    return matchSearch && matchFilt;
  });

  const priorityColor = { critical:'b-red', high:'b-amber', medium:'b-navy', low:'b-grey' };

  list.innerHTML = filtered.map(g => `
    <div class="griev-card" onclick="openGrievanceDetail('${g.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--navy);">${g.issue}</div>
          <div class="gc-id">${g.complaint_id} · ${g.fbo_name}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span class="badge ${priorityColor[g.priority] || 'b-grey'}">${g.priority.charAt(0).toUpperCase() + g.priority.slice(1)}</span>
          <span class="badge ${g.status === 'resolved' ? 'b-green' : 'b-amber'}">${g.status === 'resolved' ? '✅ Resolved' : '⏳ ' + g.status.replace('_',' ')}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:11px;color:var(--g400);">Filed ${g.filed}</div>
        <div style="display:flex;gap:6px;">
          ${g.status !== 'resolved' ? `<button class="btn btn-green btn-xs" onclick="event.stopPropagation();resolveGrievance('${g.id}')">✓ Resolve</button>` : ''}
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openGrievanceDetail('${g.id}')">View →</button>
        </div>
      </div>
    </div>`).join('') || '<div class="empty"><div class="empty-ico">💬</div>No grievances match your filter</div>';
}

function openGrievanceDetail(id) {
  showToast('Opening grievance ' + id + '…');
}

async function resolveGrievance(id) {
  try {
    await authFetch(`/api/officer/grievances/${id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status:'resolved' }),
    });
  } catch(_) {}
  const g = SAMPLE_GRIEVANCES.find(x => x.id === id);
  if (g) g.status = 'resolved';
  showToast('✅ Grievance resolved and applicant notified.');
  renderGrievances();
}

// ── Modals & Panels ────────────────────────────────────────────
function openNotifPanel() {
  const ov = document.getElementById('panel-ov');
  const sp = document.getElementById('side-panel');
  if (ov) ov.style.display = 'block';
  if (sp) sp.style.transform = 'translateX(0)';
}

function closePanel() {
  const ov = document.getElementById('panel-ov');
  const sp = document.getElementById('side-panel');
  if (ov) ov.style.display = 'none';
  if (sp) sp.style.transform = 'translateX(100%)';
}

function openFlagModal(appId) {
  _currentAppId = appId;
  const modal = document.getElementById('flag-modal');
  if (modal) modal.classList.add('open');
}

function closeFlagModal() {
  const modal = document.getElementById('flag-modal');
  if (modal) modal.classList.remove('open');
}

async function submitFlag() {
  const reason = document.getElementById('flag-reason-select')?.value;
  const note   = document.getElementById('flag-note')?.value;
  if (!reason) { alert('Please select a flag reason.'); return; }
  try {
    await authFetch(`/api/officer/applications/${_currentAppId}/status`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status:'flagged', flag_reason: reason + (note ? ': ' + note : '') }),
    });
  } catch(_) {}
  const app = SAMPLE_APPS.find(a => a.id === _currentAppId);
  if (app) { app.flagged = true; app.flagReason = reason + (note ? ': ' + note : ''); }
  closeFlagModal();
  showToast('🚩 Application flagged. Applicant notified.');
  renderApps();
}

function openAssignModal() {
  const modal = document.getElementById('assign-modal');
  if (modal) modal.classList.add('open');
  const dateEl = document.getElementById('insp-date');
  if (dateEl) {
    const d = new Date();
    d.setDate(d.getDate() + 7);
    dateEl.value = d.toISOString().split('T')[0];
  }
}

function closeAssignModal() {
  const modal = document.getElementById('assign-modal');
  if (modal) modal.classList.remove('open');
}

function confirmAssign() {
  closeAssignModal();
  showToast('✅ Inspection assigned and officer notified.');
}

// ── Tabs ───────────────────────────────────────────────────────
function switchTab(group, tab, btn) {
  document.querySelectorAll(`#${group === 'queue' ? 'page-myqueue' : group === 'insp' ? 'page-inspections' : 'app-detail-page'} .tab-btn`).forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`#${group === 'queue' ? 'page-myqueue' : group === 'insp' ? 'page-inspections' : 'app-detail-page'} .tab-pane`).forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const pane = document.getElementById(`${group === 'appdet' ? 'appdet' : group}-tab-${tab}`);
  if (pane) pane.classList.add('active');
}

// ── Charts ─────────────────────────────────────────────────────
function initCharts() {
  const chartEl = document.getElementById('dash-chart');
  if (chartEl) {
    const data = [42,38,55,61,49,70,65,73,58,80,74,88];
    const labels = ['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
    const max  = Math.max(...data);
    chartEl.innerHTML = data.map((v, i) => `
      <div class="bc-col">
        <div class="bc-bar" style="height:${(v/max*100)}%;background:${i === 11 ? 'var(--sage)' : 'var(--navyLt)'}"></div>
        <div class="bc-lbl">${labels[i]}</div>
      </div>`).join('');
  }

  const riskEl = document.getElementById('dash-risk');
  if (riskEl) {
    const zones = [
      { name:'Laitumkhrah', val:87, color:'var(--green)' },
      { name:'Police Bazar', val:72, color:'var(--amber)' },
      { name:'Mawlai',       val:91, color:'var(--green)' },
      { name:'Nongthymmai',  val:58, color:'var(--red)'   },
    ];
    riskEl.innerHTML = zones.map(z => `
      <div class="risk-item">
        <div class="risk-hd"><span>${z.name}</span><span>${z.val}%</span></div>
        <div class="risk-track"><div class="risk-fill" style="width:${z.val}%;background:${z.color}"></div></div>
      </div>`).join('');
  }
}

// ── Topbar search ──────────────────────────────────────────────
function handleTopbarSearch(query) {
  if (!query.trim()) return;
  navigate('fbo');
  const searchEl = document.getElementById('fbo-search');
  if (searchEl) { searchEl.value = query; renderFBO(); }
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Clock ──────────────────────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    const el  = document.getElementById('tb-date');
    if (el) el.textContent = now.toLocaleDateString('en-IN', { weekday:'short', day:'2-digit', month:'short' }) + ' · ' + now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }
  tick();
  setInterval(tick, 60000);
}

// ── Expose to window ───────────────────────────────────────────
Object.assign(window, {
  officerSendOTP, officerVerifyOTP, officerOtpAdv, officerLogout,
  navigate, loadOfficerDashboard,
  renderApps, openAppDetail, closeAppDetail,
  reviewDocument, getSignedURL, updateAppStatus,
  openDocRejectDialog, setFilt,
  renderFBO, openFBOProfile, closeFBOProfile,
  renderGrievances, openGrievanceDetail, resolveGrievance,
  openNotifPanel, closePanel,
  openFlagModal, closeFlagModal, submitFlag,
  openAssignModal, closeAssignModal, confirmAssign,
  switchTab, showToast, handleTopbarSearch,
});

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  await initServices();

  // Restore officer session
  const stored = localStorage.getItem('officer_token');
  const storedUser = localStorage.getItem('officer_user');
  if (stored) {
    officerToken = stored;
    if (storedUser) { try { updateOfficerProfile(JSON.parse(storedUser)); } catch(_) {} }
    enterPortal();
  }
})();
</script>
</body>
</html>
