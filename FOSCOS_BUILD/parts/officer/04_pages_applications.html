<!-- ══════════════════════════════════════════════════════════════
     PART 04 — APPLICATIONS + APP DETAIL + FBO PROFILE
     ══════════════════════════════════════════════════════════════ -->

<!-- ▌ APPLICATIONS ▌ -->
<div class="page" id="page-applications">
  <div class="toolbar">
    <div class="tb-inp"><span style="color:var(--g400)">🔍</span><input type="text" placeholder="Search applications…" id="app-search" oninput="renderApps()"/></div>
    <div class="ftabs" id="app-ftabs">
      <div class="ft active" onclick="setFilt('app','All',this)">All</div>
      <div class="ft" onclick="setFilt('app','New',this)">New</div>
      <div class="ft" onclick="setFilt('app','Pending',this)">Pending</div>
      <div class="ft" onclick="setFilt('app','Approved',this)">Approved</div>
      <div class="ft" onclick="setFilt('app','Delayed',this)">Delayed</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="showToast('Exporting CSV…')">⬇ Export</button>
  </div>
  <div class="card card-flush">
    <div class="tbl-wrap"><table>
      <thead><tr><th>App ID</th><th>Business Name</th><th>Category</th><th>Date Filed</th><th>Pipeline Step</th><th>Status</th><th>Officer</th><th></th></tr></thead>
      <tbody id="app-tbody"></tbody>
    </table></div>
  </div>
</div>

<!-- ▌ APPLICATION DETAIL PAGE ▌ -->
<div id="app-detail-page">
  <div style="margin-bottom:14px">
    <button class="btn btn-ghost btn-sm" onclick="closeAppDetail()">← Back to Applications</button>
  </div>
  <div class="app-det-hd" id="app-det-hd"></div>

  <div class="pipeline" id="app-pipeline"></div>

  <div class="tab-bar">
    <div class="tab-btn active" onclick="switchTab('appdet','info',this)">Business Info</div>
    <div class="tab-btn" onclick="switchTab('appdet','docs',this)">Documents</div>
    <div class="tab-btn" onclick="switchTab('appdet','trail',this)">Audit Trail</div>
    <div class="tab-btn" onclick="switchTab('appdet','flags',this)">Flag History</div>
  </div>
  <div class="tab-pane active" id="appdet-tab-info"><div id="appdet-info-content"></div></div>
  <div class="tab-pane" id="appdet-tab-docs"><div id="appdet-docs-content"></div></div>
  <div class="tab-pane" id="appdet-tab-trail"><div id="appdet-trail-content"></div></div>
  <div class="tab-pane" id="appdet-tab-flags"><div id="appdet-flags-content"></div></div>
</div>

<!-- ▌ FBO PROFILE PAGE ▌ -->
<div id="fbo-profile-page">
  <div style="margin-bottom:14px">
    <button class="btn btn-ghost btn-sm" onclick="closeFBOProfile()">← Back</button>
  </div>
  <div id="fbo-profile-content"></div>
</div>
